<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy — ChatBookPT</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F5F0E8;
    --warm-white: #FAF7F2;
    --bark: #5C3D2E;
    --bark-light: #8B6355;
    --sand: #C8A882;
    --sand-light: #E8D5BC;
    --ink-soft: #6B5744;
  }
  body {
    background: var(--cream);
    font-family: 'Lora', Georgia, serif;
    color: var(--bark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 80px;
  }
  .container {
    width: 100%;
    max-width: 640px;
  }
  .back {
    display: inline-block;
    font-size: 13px;
    color: var(--bark-light);
    text-decoration: none;
    letter-spacing: 0.04em;
    margin-bottom: 40px;
    opacity: 0.7;
  }
  .back:hover { opacity: 1; }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 600;
    color: var(--bark);
    margin-bottom: 8px;
  }
  .updated {
    font-size: 12px;
    color: var(--bark-light);
    opacity: 0.6;
    letter-spacing: 0.05em;
    margin-bottom: 40px;
  }
  .divider {
    width: 40px;
    height: 1px;
    background: var(--sand);
    margin: 0 0 40px;
  }
  ol {
    padding-left: 20px;
  }
  li {
    font-size: 16px;
    line-height: 1.8;
    color: var(--ink-soft);
    margin-bottom: 20px;
  }
  li strong {
    color: var(--bark);
    display: block;
    margin-bottom: 4px;
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 15px;
  }
</style>
</head>
<body>
<div class="container">
  <a href="/" class="back">← ChatBookPT</a>
  <h1>Privacy</h1>
  <p class="updated">California · Est. 2025</p>
  <div class="divider"></div>
  <ol>
    <li>
      <strong>Stories are public</strong>
      Stories published through ChatBookPT will be publicly accessible on chatbookpt.com. Do not include personal information you would not want publicly visible.
    </li>
  </ol>
</div>
</body>
</html>
